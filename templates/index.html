<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }
        .navbar-nav .nav-link {
            color: rgba(255,255,255,0.8) !important;
        }
        .navbar-nav .nav-link:hover {
            color: white !important;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .hero-section {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 0;
        }
        .hero-section h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .hero-section p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1em;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
        }
        .location-info {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f8f9fa;
        }
        .location-info h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.6em;
        }
        .location-info p {
            color: #666;
            font-size: 1.1em;
        }
        .location-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 600;
            margin-top: 10px;
        }
        .price-estimate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .price-estimate .label {
            font-size: 1em;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        .price-estimate .amount {
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .model-predictions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .model-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .model-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .model-card h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .model-card .price {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }
        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            color: #667eea;
        }
        .form-control:focus + .input-group-text,
        .input-group-text:focus {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-home"></i> Real Estate Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="fas fa-calculator"></i> Predict</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="fas fa-chart-bar"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/compare"><i class="fas fa-balance-scale"></i> Compare</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/history"><i class="fas fa-history"></i> History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section">
            <h1><i class="fas fa-home"></i> Real Estate Price Predictor</h1>
            <p>Get accurate property price estimates using advanced machine learning algorithms</p>
        </div>
        
        <div class="form-card">
            <form id="predictForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" for="location"><i class="fas fa-map-marker-alt"></i> Location:</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Los Angeles, CA" required>
                                <span class="input-group-text"><i class="fas fa-search"></i></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" for="area_sqft"><i class="fas fa-ruler-combined"></i> House Area (sqft):</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="area_sqft" name="area_sqft" placeholder="e.g., 2000" required>
                                <span class="input-group-text"><i class="fas fa-home"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label" for="bedrooms"><i class="fas fa-bed"></i> Bedrooms:</label>
                            <input type="number" class="form-control" id="bedrooms" name="bedrooms" placeholder="e.g., 3" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label" for="bathrooms"><i class="fas fa-bath"></i> Bathrooms:</label>
                            <input type="number" class="form-control" id="bathrooms" name="bathrooms" placeholder="e.g., 2" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label" for="house_age"><i class="fas fa-clock"></i> House Age (years):</label>
                            <input type="number" class="form-control" id="house_age" name="house_age" placeholder="e.g., 10" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-calculator"></i> Get Price Estimate</button>
            </form>
        </div>
        
        <div id="results"></div>
    </div>
    
    <script>
        $('#predictForm').on('submit', function(e) {
            e.preventDefault();
            const data = {
                location: $('#location').val(),
                area_sqft: parseFloat($('#area_sqft').val()),
                bedrooms: parseInt($('#bedrooms').val()),
                bathrooms: parseInt($('#bathrooms').val()),
                house_age: parseInt($('#house_age').val())
            };
            $.ajax({
                url: '/predict',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(data) {
                    // Calculate average price
                    const prices = Object.values(data.predictions);
                    const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
                    
                    // Get currency symbol
                    const currencySymbol = data.currency.symbol;
                    const currencyCode = data.currency.code;
                    
                    let html = '<div class="result-card">';
                    html += '<div class="location-info">';
                    html += `<h2><i class="fas fa-map-marker-alt"></i> ${data.address}</h2>`;
                    html += `<span class="location-badge">${data.location_type}</span>`;
                    html += `<p style="margin-top: 15px; font-size: 0.95em; color: #666;"><i class="fas fa-globe"></i> Country: ${data.country_code} | Currency: ${currencyCode}</p>`;
                    html += '</div>';
                    
                    html += '<div class="predictions">';
                    html += '<div class="price-estimate">';
                    html += '<div class="label"><i class="fas fa-calculator"></i> Estimated Price</div>';
                    html += `<div class="amount">${currencySymbol}${avgPrice.toLocaleString('en-US', {maximumFractionDigits: 2})}</div>`;
                    html += '</div>';
                    
                    html += '<h3 class="mb-4"><i class="fas fa-chart-line"></i> Model Predictions:</h3>';
                    html += '<div class="model-predictions">';
                    for (const [model, price] of Object.entries(data.predictions)) {
                        html += '<div class="model-card">';
                        html += `<h4><i class="fas fa-brain"></i> ${model}</h4>`;
                        html += `<div class="price">${currencySymbol}${price.toLocaleString('en-US', {maximumFractionDigits: 2})}</div>`;
                        html += '</div>';
                    }
                    html += '</div>';
                    html += '</div>';
                    html += '</div>';
                    
                    $('#results').html(html);
                },
                error: function() {
                    $('#results').html('<div class="result-card"><p style="color: red;">Error getting prediction. Please try again.</p></div>');
                }
            });
        });
    </script>
</body>
</html>
